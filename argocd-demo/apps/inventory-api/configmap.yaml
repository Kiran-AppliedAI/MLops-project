---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-api-nginx-conf
  namespace: production
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        location /health {
            default_type application/json;
            return 200 '{"status":"healthy","service":"inventory-api","version":"3.1.0"}';
        }

        location /api/v1/inventory {
            alias /usr/share/nginx/html/inventory.json;
            default_type application/json;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            default_type application/json;
        }
    }
