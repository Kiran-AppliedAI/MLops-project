  index.html: |
    {"service":"inventory-api","version":"3.1.0","endpoints":["/health","/api/v1/inventory","/api/v1/stores"]}
  inventory.json: |
    {
      "data": [
        {"sku_id": "WMN-DRS-004521", "store_id": "NYNYC-001", "inventory_count": 142, "department": "WMN"},
        {"sku_id": "MEN-SHR-002341", "store_id": "CASFO-002", "inventory_count": 185, "department": "MEN"},
