apiVersion: apps/v1
kind: Deployment
metadata:
  name: clientfacing-ui
  namespace: production
  labels:
    app: clientfacing-ui
    team: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clientfacing-ui
  template:
    metadata:
      labels:
        app: clientfacing-ui
        team: frontend
    spec:
      containers:
        - name: ui
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: ui-config
              mountPath: /usr/share/nginx/html
      volumes:
        - name: ui-config
          configMap:
            name: clientfacing-ui-content
