apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: production
  labels:
    app: inventory-api
    team: backend
    version: v2.3.1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
        version: v2.3.1
    spec:
      containers:
        - name: api
          image: nginx:1.25-alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          env:
            - name: APP_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
      volumes:
        - name: nginx-config
          configMap:
            name: inventory-api-config
            items:
              - key: nginx.conf
                path: default.conf
