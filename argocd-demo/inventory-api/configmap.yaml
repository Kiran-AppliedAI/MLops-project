apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-api-config
  namespace: production
  labels:
    app: inventory-api
    team: backend
data:
  nginx.conf: |
    server {
        listen 8080;
        server_name _;

        location /health {
            return 200 '{"status":"healthy","app":"inventory-api","version":"2.3.1"}';
            add_header Content-Type application/json;
        }

        location /api/v1/stores {
            return 200 '{"stores":[{"id":"NYNYC-001","name":"Herald Square","status":"active"},{"id":"CASFO-002","name":"Union Square","status":"active"},{"id":"TXDAL-001","name":"NorthPark Center","status":"active"}],"total":847}';
            add_header Content-Type application/json;
        }

        location /api/v1/inventory/summary {
            return 200 '{"total_skus":12847,"total_units":2340000,"departments":7,"stores":847,"last_updated":"2026-06-18T10:00:00Z"}';
            add_header Content-Type application/json;
        }

        location /api/v1/alerts {
            return 200 '{"active_alerts":3,"alerts":[{"id":"ALT-001","severity":"warning","message":"Store WASET-001 below reorder threshold"},{"id":"ALT-002","severity":"info","message":"Demand forecast updated"},{"id":"ALT-003","severity":"warning","message":"Pricing margin anomaly detected"}]}';
            add_header Content-Type application/json;
        }

        location / {
            return 200 '{"service":"inventory-api","version":"2.3.1","endpoints":["/api/v1/stores","/api/v1/inventory/summary","/api/v1/alerts","/health"]}';
            add_header Content-Type application/json;
        }
    }
